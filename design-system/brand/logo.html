<!-- @dsCard group="Brand" name="Logo Lockup" subtitle="Placed wordmark, tagline & mark spacing" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap');
  :root{--blue:#4a60dc;--orange:#e88a3a;--dark:#1a1a2e;--bg:#f7f8fc;--card:#fff;--border:#e8ecf4;--text-secondary:#8b90a8}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Outfit',-apple-system,sans-serif;background:var(--bg);padding:32px;-webkit-font-smoothing:antialiased}
  h2{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text-secondary);margin:0 0 14px}
  .block{margin-bottom:28px}
  .brand-logo{display:flex;align-items:center;gap:11px}
  .brand-mark{width:42px;height:42px;border-radius:11px;flex-shrink:0;background:linear-gradient(135deg,var(--orange),var(--blue));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:20px}
  .brand-word{display:flex;flex-direction:column;line-height:1}
  .brand-placed{font-size:24px;font-weight:800;color:var(--dark);letter-spacing:-.01em}
  .brand-tag{font-size:8.5px;font-weight:700;letter-spacing:.16em;color:var(--text-secondary);text-transform:uppercase;margin-top:4px}
  .note{font-size:11px;color:var(--text-secondary);margin-top:12px;max-width:420px;line-height:1.5}
  .dark{background:var(--dark);border-radius:12px;padding:20px}
  .dark .brand-placed{color:#fff}
  .dark .brand-tag{color:rgba(255,255,255,.55)}
</style>
</head>
<body>
  <div class="block">
    <h2>Primary lockup</h2>
    <div class="brand-logo">
      <span class="brand-mark">P</span>
      <span class="brand-word">
        <span class="brand-placed">Placed</span>
        <span class="brand-tag">From Pitched to Placed</span>
      </span>
    </div>
    <div class="note">Preview shows the lockup structure and type. In the app the mark is the real <code>placed-icon.png</code> asset; swap this placeholder square for the exported logo when refining.</div>
  </div>

  <div class="block">
    <h2>On dark</h2>
    <div class="dark">
      <div class="brand-logo">
        <span class="brand-mark">P</span>
        <span class="brand-word">
          <span class="brand-placed">Placed</span>
          <span class="brand-tag">From Pitched to Placed</span>
        </span>
      </div>
    </div>
  </div>
</body>
</html>
