<!-- @dsCard group="Components" name="Badges, Tags & Source Cards" subtitle="Status pills, tags, check states & royalty source cards" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap');
  :root{--blue:#4a60dc;--orange:#e88a3a;--red:#dc2626;--green:#16a34a;--purple:#7c3aed;--dark:#1a1a2e;--bg:#f7f8fc;--card:#fff;--border:#e8ecf4;--text-secondary:#8b90a8;--text-muted:#c0c4d4;--radius:12px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Outfit',-apple-system,sans-serif;background:var(--bg);padding:28px;-webkit-font-smoothing:antialiased}
  h2{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text-secondary);margin:0 0 12px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:24px}
  .tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;border:1px solid transparent;background:var(--card);color:var(--text-secondary)}
  .pitch-badge{font-size:10px;padding:2px 8px;border-radius:12px;font-weight:600;display:inline-block;background:rgba(74,96,220,.1);color:var(--blue);border:1px solid rgba(74,96,220,.2)}
  .status{font-size:10px;font-weight:700;padding:2px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
  .st-need{background:rgba(239,68,68,.12);color:#dc2626}
  .st-prog{background:rgba(232,138,58,.15);color:#c97a2e}
  .st-deliv{background:rgba(34,197,94,.15);color:#16a34a}
  .st-avail{background:rgba(124,58,237,.12);color:#7c3aed}
  .check-btn{width:22px;height:22px;border-radius:6px;border:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-muted)}
  .check-btn.checked{background:rgba(22,163,74,.15);border-color:rgba(22,163,74,.4);color:var(--green)}
  .source-breakdown{display:flex;gap:12px;flex-wrap:wrap}
  .source-card{background:var(--card);border:1px solid var(--border);border-top:3px solid var(--border);border-radius:var(--radius);box-shadow:0 1px 4px rgba(26,26,46,.06);padding:12px 18px;min-width:150px}
  .source-name{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-secondary)}
  .source-dot{width:9px;height:9px;border-radius:50%}
  .source-amt{font-size:22px;font-weight:800;margin-top:4px;color:var(--dark)}
</style>
</head>
<body>
  <h2>Status pills</h2>
  <div class="row">
    <span class="status st-need">Need to Start</span>
    <span class="status st-prog">In Progress</span>
    <span class="status st-deliv">Delivered</span>
    <span class="status st-avail">Available</span>
  </div>

  <h2>Tags &amp; pitch badges</h2>
  <div class="row">
    <span class="tag">120 BPM</span><span class="tag">Am</span><span class="tag">Below Deck</span>
    <span class="pitch-badge">Pond5</span><span class="pitch-badge">ThatPitch</span><span class="pitch-badge">Tunedge</span>
  </div>

  <h2>Check states</h2>
  <div class="row">
    <div class="check-btn">·</div>
    <div class="check-btn checked">✓</div>
  </div>

  <h2>Royalty source cards</h2>
  <div class="source-breakdown">
    <div class="source-card" style="border-top-color:var(--blue)"><div class="source-name"><span class="source-dot" style="background:var(--blue)"></span>ASCAP</div><div class="source-amt">$6,420</div></div>
    <div class="source-card" style="border-top-color:var(--purple)"><div class="source-name"><span class="source-dot" style="background:var(--purple)"></span>Prolific Arts</div><div class="source-amt">$3,180</div></div>
    <div class="source-card" style="border-top-color:var(--orange)"><div class="source-name"><span class="source-dot" style="background:var(--orange)"></span>LANDR</div><div class="source-amt">$1,540</div></div>
    <div class="source-card" style="border-top-color:var(--green)"><div class="source-name"><span class="source-dot" style="background:var(--green)"></span>Songtrust</div><div class="source-amt">$1,340</div></div>
  </div>
</body>
</html>
