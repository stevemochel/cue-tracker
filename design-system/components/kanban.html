<!-- @dsCard group="Components" name="Kanban Columns" subtitle="Pipeline board: grouped status columns" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap');
  :root{--blue:#4a60dc;--orange:#e88a3a;--red:#ef4444;--green:#22c55e;--dark:#1a1a2e;--bg:#f7f8fc;--card:#fff;--border:#e8ecf4;--border-light:#f1f4f9;--text-secondary:#8b90a8;--text-muted:#c0c4d4;--radius:12px;--radius-sm:8px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Outfit',-apple-system,sans-serif;background:var(--bg);padding:28px;-webkit-font-smoothing:antialiased}
  .kanban-group-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .kanban-group-dot{width:8px;height:8px;border-radius:50%;background:var(--blue)}
  .kanban-group-title{font-size:13px;font-weight:700;color:var(--dark);letter-spacing:.05em;text-transform:uppercase}
  .kanban-group-count{font-size:12px;color:var(--text-muted)}
  .kanban-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;max-width:820px}
  .kanban-col{background:var(--bg);border-radius:0 0 var(--radius) var(--radius);padding:12px;border-top:3px solid var(--border)}
  .kanban-col.red{border-top-color:var(--red)}
  .kanban-col.orange{border-top-color:var(--orange)}
  .kanban-col.green{border-top-color:var(--green)}
  .kanban-col-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 2px}
  .kanban-col-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
  .kanban-col-count{font-size:11px;color:var(--text-muted);font-weight:600}
  .mini{background:var(--card);border-radius:8px;padding:9px 11px;border:1px solid var(--border-light);box-shadow:0 1px 4px rgba(26,26,46,.06);margin-bottom:8px}
  .mini-t{font-size:12px;font-weight:600;color:var(--dark)}
  .mini-s{font-size:10px;color:var(--text-secondary);margin-top:2px}
  .kanban-empty{font-size:12px;color:var(--text-muted);text-align:center;padding:20px;border:1px dashed var(--border);border-radius:var(--radius-sm)}
</style>
</head>
<body>
  <div class="kanban-group-header">
    <span class="kanban-group-dot"></span>
    <span class="kanban-group-title">Below Deck</span>
    <span class="kanban-group-count">· 5 cues</span>
  </div>
  <div class="kanban-cols">
    <div class="kanban-col red">
      <div class="kanban-col-header"><span class="kanban-col-title" style="color:var(--red)">Need to Start</span><span class="kanban-col-count">2</span></div>
      <div class="mini"><div class="mini-t">Harbor Lights</div><div class="mini-s">Due Jul 18</div></div>
      <div class="mini"><div class="mini-t">Undertow</div><div class="mini-s">Due Jul 22</div></div>
    </div>
    <div class="kanban-col orange">
      <div class="kanban-col-header"><span class="kanban-col-title" style="color:#c97a2e">In Progress</span><span class="kanban-col-count">1</span></div>
      <div class="mini"><div class="mini-t">Dawn's Awakening</div><div class="mini-s">Due Jul 15</div></div>
    </div>
    <div class="kanban-col green">
      <div class="kanban-col-header"><span class="kanban-col-title" style="color:var(--green)">Delivered</span><span class="kanban-col-count">0</span></div>
      <div class="kanban-empty">Nothing delivered yet</div>
    </div>
  </div>
</body>
</html>
