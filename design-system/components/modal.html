<!-- @dsCard group="Components" name="Modal & Batch Creator" subtitle="Dialog with sections, fields & inline batch creator" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap');
  :root{--blue:#4a60dc;--orange:#e88a3a;--dark:#1a1a2e;--bg:#f7f8fc;--card:#fff;--border:#e8ecf4;--border-light:#f1f4f9;--text:#2d3148;--text-secondary:#8b90a8;--radius-sm:8px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Outfit',-apple-system,sans-serif;background:rgba(26,26,46,.35);color:var(--text);padding:28px;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;-webkit-font-smoothing:antialiased}
  input,select{width:100%;padding:9px 12px;font-size:13px;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);outline:none;font-family:inherit}
  .modal{background:var(--card);border-radius:16px;padding:28px;width:100%;max-width:520px;border:1px solid var(--border);box-shadow:0 12px 40px rgba(26,26,46,.12)}
  .modal-title{font-size:17px;font-weight:800;color:var(--dark);margin-bottom:20px}
  .modal-section{font-size:12px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.08em;margin:18px 0 10px;padding-top:14px;border-top:1px solid var(--border-light)}
  .label{display:block;font-size:10px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
  .field{margin-bottom:14px}
  .field-row{display:flex;gap:12px}
  .field-row>.field{flex:1}
  .batch-creator{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:14px;border:1px solid rgba(74,96,220,.15)}
  .batch-creator-title{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
  .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
  .btn{padding:9px 18px;font-size:13px;font-weight:600;border:none;border-radius:var(--radius-sm);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .btn-primary{background:var(--orange);color:#fff}
  .btn-ghost{background:#f1f3f9;color:#64748b}
  .btn-sm{padding:5px 12px;font-size:11px}
  .btn-outline{background:var(--card);color:var(--blue);border:1px solid rgba(74,96,220,.3)}
</style>
</head>
<body>
  <div class="modal">
    <div class="modal-title">Add a New Cue</div>
    <div class="field"><label class="label">Cue Title</label><input value="Dawn's Awakening" /></div>
    <div class="field-row">
      <div class="field"><label class="label">BPM</label><input value="120" /></div>
      <div class="field"><label class="label">Due Date</label><input type="date" value="2026-07-15" /></div>
    </div>

    <div class="modal-section">Batch</div>
    <div class="batch-creator">
      <div class="batch-creator-title">New Batch</div>
      <div class="field-row">
        <div class="field"><label class="label" style="font-size:10px">Name</label><input value="July Brief" /></div>
        <div class="field"><label class="label" style="font-size:10px">Sign-Up</label><input type="date" /></div>
        <div class="field"><label class="label" style="font-size:10px">Deliver</label><input type="date" value="2026-07-15" /></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end">
        <button class="btn btn-ghost btn-sm">Cancel</button>
        <button class="btn btn-outline btn-sm">Create</button>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost">Cancel</button>
      <button class="btn btn-primary">Add Cue</button>
    </div>
  </div>
</body>
</html>
