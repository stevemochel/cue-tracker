<!-- @dsCard group="Components" name="Buttons" subtitle="Primary, blue, outline, ghost, semantic, icon & sizes" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap');
  :root{--blue:#4a60dc;--orange:#e88a3a;--red:#dc2626;--green:#16a34a;--bg:#f7f8fc;--card:#fff;--border:#e8ecf4;--text:#2d3148;--text-secondary:#8b90a8;--radius-sm:8px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Outfit',-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:28px;-webkit-font-smoothing:antialiased}
  h2{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text-secondary);margin:0 0 12px}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:24px}
  .btn{padding:9px 18px;font-size:13px;font-weight:600;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
  .btn-primary{background:var(--orange);color:#fff}
  .btn-blue{background:var(--blue);color:#fff}
  .btn-outline{background:var(--card);color:var(--blue);border:1px solid rgba(74,96,220,.3)}
  .btn-ghost{background:#f1f3f9;color:#64748b}
  .btn-danger{background:rgba(220,38,38,.1);color:var(--red);border:1px solid rgba(220,38,38,.2)}
  .btn-green{background:rgba(22,163,74,.1);color:var(--green);border:1px solid rgba(22,163,74,.25)}
  .btn-red-outline{background:rgba(220,38,38,.1);color:var(--red);border:1px solid rgba(220,38,38,.25)}
  .btn-sm{padding:5px 12px;font-size:11px}
  .btn-icon{width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text-secondary);cursor:pointer;font-size:12px;padding:0}
</style>
</head>
<body>
  <h2>Primary actions</h2>
  <div class="row">
    <button class="btn btn-primary">+ Add Cue</button>
    <button class="btn btn-blue">Save</button>
    <button class="btn btn-outline">Import</button>
    <button class="btn btn-ghost">Cancel</button>
  </div>

  <h2>Semantic</h2>
  <div class="row">
    <button class="btn btn-green">✓ Accept</button>
    <button class="btn btn-red-outline">Reject</button>
    <button class="btn btn-danger">Delete</button>
  </div>

  <h2>Small &amp; icon</h2>
  <div class="row">
    <button class="btn btn-primary btn-sm">Create</button>
    <button class="btn btn-outline btn-sm">Template</button>
    <button class="btn btn-ghost btn-sm">Cancel</button>
    <button class="btn-icon">✎</button>
    <button class="btn-icon">↦</button>
    <button class="btn-icon">×</button>
  </div>

  <h2>Disabled</h2>
  <div class="row">
    <button class="btn btn-outline btn-sm" style="opacity:.4;cursor:default">Create</button>
  </div>
</body>
</html>
