<!-- @dsCard group="Components" name="Alerts & Empty States" subtitle="Inline alerts, empty states & loading spinner" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap');
  :root{--blue:#4a60dc;--dark:#1a1a2e;--bg:#f7f8fc;--card:#fff;--border:#e8ecf4;--text-secondary:#8b90a8;--radius-sm:8px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Outfit',-apple-system,sans-serif;background:var(--bg);color:var(--text-secondary);padding:28px;-webkit-font-smoothing:antialiased}
  h2{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text-secondary);margin:0 0 12px}
  .block{margin-bottom:26px;max-width:520px}
  .alert{border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;margin-bottom:10px}
  .alert-error{background:rgba(220,38,38,.08);color:#b91c1c;border:1px solid rgba(220,38,38,.2)}
  .alert-info{background:rgba(74,96,220,.08);color:var(--blue);border:1px solid rgba(74,96,220,.2)}
  .empty{text-align:center;padding:40px 20px;background:var(--card);border:1px solid var(--border);border-radius:12px}
  .empty-title{font-size:16px;font-weight:700;color:var(--dark);margin-bottom:6px}
  .empty-text{font-size:13px}
  .spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:8px auto}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="block">
    <h2>Alerts</h2>
    <div class="alert alert-error">That import contained rows already in your catalog — 3 duplicates were skipped.</div>
    <div class="alert alert-info">Tip: selecting a batch auto-fills the due date from its delivery date.</div>
  </div>

  <div class="block">
    <h2>Empty state</h2>
    <div class="empty">
      <div class="empty-title">No cues yet</div>
      <div class="empty-text">Add your first cue or import an existing catalog to get started.</div>
    </div>
  </div>

  <div class="block">
    <h2>Loading</h2>
    <div class="spinner"></div>
  </div>
</body>
</html>
