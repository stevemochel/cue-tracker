<!-- @dsCard group="Components" name="Catalog Table" subtitle="Data table with check button & inline badges" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap');
  :root{--blue:#4a60dc;--green:#16a34a;--dark:#1a1a2e;--bg:#f7f8fc;--card:#fff;--border:#e8ecf4;--border-light:#f1f4f9;--text:#2d3148;--text-secondary:#8b90a8;--text-muted:#c0c4d4;--radius:12px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Outfit',-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:28px;-webkit-font-smoothing:antialiased}
  .table-wrap{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow-x:auto;max-width:820px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead{background:var(--bg)}
  th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border)}
  td{padding:10px 14px;border-bottom:1px solid var(--border-light);vertical-align:middle;color:var(--dark)}
  tr:last-child td{border-bottom:none}
  .check-btn{width:22px;height:22px;border-radius:6px;border:1px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-muted)}
  .check-btn.checked{background:rgba(22,163,74,.15);border-color:rgba(22,163,74,.4);color:var(--green)}
  .pitch-badge{font-size:10px;padding:2px 8px;border-radius:12px;font-weight:600;display:inline-block;margin:1px 3px 1px 0;background:rgba(74,96,220,.1);color:var(--blue);border:1px solid rgba(74,96,220,.2)}
  .amt{font-weight:700}
</style>
</head>
<body>
  <div class="table-wrap">
    <table>
      <thead><tr><th></th><th>Title</th><th>Show</th><th>Pitches</th><th>Earned</th></tr></thead>
      <tbody>
        <tr><td><div class="check-btn checked">✓</div></td><td>Dawn's Awakening</td><td>Below Deck</td><td><span class="pitch-badge">Pond5</span><span class="pitch-badge">ThatPitch</span></td><td class="amt">$1,240.00</td></tr>
        <tr><td><div class="check-btn checked">✓</div></td><td>Coastal Drift</td><td>The Challenge</td><td><span class="pitch-badge">Tunedge</span></td><td class="amt">$860.00</td></tr>
        <tr><td><div class="check-btn">·</div></td><td>Stern Warnings</td><td>—</td><td><span class="pitch-badge">Available</span></td><td class="amt">$0.00</td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>
